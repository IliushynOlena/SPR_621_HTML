<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table example 1</title>
    <style>
        table{
            border: 1px solid black;
            border-collapse: separate;
            border-spacing: 10px;
            /* border-collapse: collapse; */
            background-color: #aaaaaa;
            background-image: url(./img/bg_1.jpg);
           empty-cells: hide;
        }
        tr{
             background-color: #cccccc;
              background-image: url(./img/bg_2.jpg);
        }
        th{
            border: 1px solid red;
        }
        td{
            border: 1px solid blue;
        }
        #uniq{
            width: 30vw;
            height: 20vh;
            text-align: left;
           vertical-align: top;
            background-color: #eeeeee;
             background-image: url(./img/bg_3.jpg);

        }
    </style>
</head>
<body>
    <table>
        <!-- tr- table row -->
        <!-- th- table thead -->
        <!-- td- table data -->
        <tr>
           <th>Column 1</th>
           <th>Column 2</th>
           <th>Column 3</th>
        </tr>
        <tr>
            <td>Lorem, ipsum dolor.</td>
            <td>Mollitia, doloremque minima!</td>
            <td>Facere, deserunt temporibus?</td>
        </tr>
        <tr>
            <td>Lorem, ipsum dolor.</td>
            <td id="uniq">Cum, voluptas similique.</td>
            <td>Nisi, necessitatibus reprehenderit!</td>
        </tr>
        <tr>
            <td>Lorem, ipsum dolor.</td>
            <td>Atque, exercitationem perspiciatis.</td>
            <td></td>
        </tr>



    </table>
    
</body>
</html>
